<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ผลงานและรางวัลที่ภาคภูมิใจ</title>
    <!-- เชื่อมโยงไปยังไฟล์ style.css ในโฟลเดอร์ css -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- แถบเมนูนำทาง (Navbar) -->
    <nav class="navbar">
        <a href="index.html">หน้าแรก</a>
        <a href="education.html">ประวัติการศึกษา</a>
        <a href="activity.html" class="active">ผลงาน & รางวัล</a>
        <a href="contact.html">ติดต่อ</a>
    </nav>

    <!-- เนื้อหาหลัก -->
    <main class="container">
        
        <div class="header-title">
            <h1>🏆 รางวัลและผลงานที่ภาคภูมิใจ</h1>
            <p>รวมผลงาน การเข้าร่วมกิจกรรม และรางวัลเกียรติบัตรที่ได้รับ</p>
        </div>

        <!-- รายการการ์ดแสดงรูปรางวัล (2 รางวัล) -->
        <div class="awards-grid">

            <!-- รางวัลที่ 1 -->
            <div class="award-card">
                <div class="award-img-box">
                    <!-- ใส่ชื่อไฟล์รูปภาพรางวัลที่ 1 -->
                    <img src="cert1.jpg" alt="รูปเกียรติบัตร/รางวัลที่ 1">
                </div>
                <div class="award-info">
                    <span class="award-tag">รางวัลที่ 1</span>
                    <h3> กิจกรรมที่ 1.แข่งมารยาทไทย</h3>
                    <p class="award-date">📅 ปี พ.ศ. 2569</p>
                </div>
            </div>

            <!-- รางวัลที่ 2 -->
            <div class="award-card">
                <div class="award-img-box">
                    <!-- ใส่ชื่อไฟล์รูปภาพรางวัลที่ 2 -->
                    <img src="cert2.jpg" alt="รูปเกียรติบัตร/รางวัลที่ 2">
                </div>
                <div class="award-info">
                    <span class="award-tag">กิจกรรมที่ 2</span>
                    <h3> กิจกรรมที่ 2.ค่ายหุ่นยนต์</h3>
                    <p class="award-date">📅 ปี พ.ศ. 2568</p>
                </div>
            </div>

        </div>

    </main>

</body>
</html>
